<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Karis Properties USA — Website Development Proposal</title>
    <style>
        @page {
            size: letter;
            margin: 1in 0.75in;
        }

        @page :first {
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 10pt;
            line-height: 1.5;
            color: #1a2332;
            margin: 0;
            padding: 0;
            counter-reset: page;
        }

        /* Headers and Footers for each page */
        .page-header {
            position: running(header);
        }

        .page-footer {
            position: running(footer);
        }

        @page {
            @top-left {
                content: element(header-left);
            }
            @top-right {
                content: element(header-right);
            }
            @bottom-left {
                content: element(footer-left);
            }
            @bottom-right {
                content: element(footer-right);
            }
        }

        .header-left {
            position: running(header-left);
            font-size: 9pt;
            color: #5a6c7d;
        }

        .header-right {
            position: running(header-right);
            font-size: 9pt;
            color: #5a6c7d;
            text-align: right;
        }

        .footer-left {
            position: running(footer-left);
            font-size: 8pt;
            color: #8899aa;
        }

        .footer-right {
            position: running(footer-right);
            font-size: 8pt;
            color: #8899aa;
            text-align: right;
        }

        /* COVER PAGE */
        .cover-page {
            background: #0d1620 !important;
            color: white !important;
            text-align: center;
            padding: 2.5in 1in 2in 1in;
            min-height: 10.5in;
            page-break-after: always;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .cover-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .cover-logos img {
            height: 55px;
        }

        .cover-logo-sep {
            font-size: 2rem;
            color: rgba(0, 168, 225, 0.5);
            font-weight: 300;
        }

        .cover-badge {
            display: inline-block;
            background: rgba(0, 168, 225, 0.15);
            border: 1px solid rgba(0, 168, 225, 0.4);
            color: #00a8e1 !important;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 9pt;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.5rem;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .cover-page h1 {
            font-size: 42pt;
            font-weight: 300;
            letter-spacing: 0.02em;
            margin: 0 0 0.3in 0;
            color: white !important;
        }

        .cover-subtitle {
            font-size: 13pt;
            color: #8899aa !important;
            margin-bottom: 1.5in;
            font-weight: 300;
        }

        .cover-client {
            font-size: 11pt;
            color: white !important;
            margin-bottom: 0.3rem;
        }

        .cover-date {
            font-size: 10pt;
            color: #8899aa !important;
            margin-bottom: 1.5rem;
        }

        .cover-brand {
            font-size: 14pt;
            font-weight: 600;
            color: white !important;
            margin-bottom: 0.2rem;
        }

        .cover-brand-sub {
            font-size: 9pt;
            color: #8899aa !important;
        }

        /* CONTENT PAGES */
        .content {
            page-break-before: always;
        }

        h2 {
            font-size: 14pt;
            font-weight: 600;
            color: #0d1620 !important;
            margin: 0.25in 0 0.15in 0;
            padding-top: 0.12in;
            border-top: 3pt solid #00a8e1 !important;
            page-break-after: avoid;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        h2:first-of-type {
            margin-top: 0;
        }

        h3 {
            font-size: 11pt;
            font-weight: 600;
            color: #00a8e1 !important;
            margin: 0.2in 0 0.12in 0;
            page-break-after: avoid;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        h4 {
            font-size: 10pt;
            font-weight: 600;
            color: #1a2332 !important;
            margin: 0.16in 0 0.1in 0;
            page-break-after: avoid;
        }

        p {
            text-align: justify;
            margin: 0 0 0.12in 0;
            orphans: 3;
            widows: 3;
        }

        ul, ol {
            margin: 0.1in 0 0.14in 0;
            padding-left: 0.3in;
        }

        li {
            margin: 0 0 0.08in 0;
        }

        .card {
            background: #f4f7f9 !important;
            border: 1px solid #e5e9ec !important;
            border-radius: 8pt;
            padding: 0.14in;
            margin: 0.12in 0 0.16in 0;
            page-break-inside: avoid;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .card h3 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.15in 0;
            page-break-inside: avoid;
        }

        table thead {
            background: #0d1620 !important;
            color: white !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        table th {
            padding: 0.12in;
            text-align: left;
            font-weight: 600;
            font-size: 9pt;
            color: white !important;
        }

        table td {
            padding: 0.1in;
            border-bottom: 0.5pt solid #e5e9ec;
            font-size: 9pt;
        }

        table tbody tr:nth-child(even) {
            background: #f4f7f9 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .page-break {
            page-break-after: always;
        }

        strong {
            font-weight: 600;
        }

        * {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body>

    <div class="header-left">Karis Properties USA</div>
    <div class="header-right">Website Development Proposal</div>
    <div class="footer-left">Bogen.ai — A Division of Dave T Productions</div>
    <div class="footer-right">Page <span class="page"></span></div>

    <!-- COVER PAGE -->
    <div class="cover-page">
        <div class="cover-logos">
            <img src="https://bogen.ai/images/eb-logo.png" alt="Bogen.ai">
            <span class="cover-logo-sep">×</span>
            <img src="https://bogen.ai/proposals/karis-properties-logo.png" alt="Karis Properties">
        </div>
        <div class="cover-badge">Website Development Proposal</div>
        <h1>Karis Properties USA</h1>
        <div class="cover-subtitle">Professional Real Estate Web Presence for the Denver Market</div>
        <div class="cover-client">Prepared for: Mike Farr</div>
        <div class="cover-date">April 2026</div>
        <div class="cover-brand">Bogen.ai</div>
        <div class="cover-brand-sub">A Division of Dave T Productions</div>
    </div>

    <!-- CONTENT TO BE INSERTED -->

</body>
</html>
