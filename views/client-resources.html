<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources - Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/client-theme.css">
  <style>
    :root { --sidebar-width: 260px; }
    body { display: flex; min-height: 100vh; }

    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width); display: flex; flex-direction: column; z-index: 100; }
    .sidebar-header { padding: var(--spacing-lg); }
    .sidebar-nav { flex: 1; padding: var(--spacing-md) 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md) var(--spacing-lg); text-decoration: none; transition: all 0.15s ease; }
    .sidebar-nav svg { width: 20px; height: 20px; }
    .sidebar-footer { padding: var(--spacing-lg); }

    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 48px; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main-content { margin-left: 0; padding: 24px; }
    }

    .page-header { margin-bottom: 40px; }
    .page-title { font-size: 1.75rem; color: #1a3e5c; margin-bottom: 6px; }
    .page-subtitle { color: #3d5264; font-size: 1rem; font-weight: 500; }

    /* Resource cards */
    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }

    .resource-card {
      background: #ffffff;
      border: 1px solid rgba(26, 62, 92, 0.1);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(26, 62, 92, 0.06);
    }

    .resource-card:hover {
      border-color: #00a8e1;
      box-shadow: 0 6px 24px rgba(0, 168, 225, 0.14);
      transform: translateY(-3px);
    }

    /* Thumbnail banner — shows PDF cover image */
    .resource-thumbnail {
      height: 220px;
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      position: relative;
      overflow: hidden;
    }

    /* Fallback gradient banner when no thumbnail */
    .resource-icon-banner {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .resource-icon-banner.pdf {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    }

    .resource-icon-banner.video {
      background: linear-gradient(135deg, #8e44ad 0%, #6c3483 100%);
    }

    .resource-icon-banner.template {
      background: linear-gradient(135deg, #00a8e1 0%, #0077b6 100%);
    }

    .resource-icon-banner.guide {
      background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
    }

    .resource-icon-banner.default {
      background: linear-gradient(135deg, #1a3e5c 0%, #2c6e9e 100%);
    }

    .resource-icon-banner svg {
      width: 44px;
      height: 44px;
      color: rgba(255, 255, 255, 0.95);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .resource-icon-label {
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Card body */
    .resource-body {
      padding: 24px;
    }

    .resource-category {
      font-size: 0.75rem;
      font-weight: 700;
      color: #00a8e1;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .resource-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f1d2a;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .resource-desc {
      font-size: 0.9rem;
      color: #3d5264;
      line-height: 1.6;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .resource-actions {
      display: flex;
      gap: 10px;
    }

    .resource-actions .btn {
      font-size: 0.875rem;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #6b7f90;
      grid-column: 1 / -1;
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      color: #8899a8;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header"><a href="/" class="logo">bogen<span>.ai</span></a></div>
    <nav class="sidebar-nav">
      <a href="/client-dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="/client-transactions"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Transactions</a>
      <a href="/client-resources" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Resources</a>
      <a href="/client-messages"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Messages</a>
      <a href="/client-reports"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Reports</a>
      <a href="/client-documents"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>Documents</a>
      <a href="/client-appointments"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Appointments</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/client-profile" class="btn btn-secondary btn-sm" style="width: 100%; margin-bottom: var(--spacing-xs);">Profile</a>
      <button onclick="logout()" class="btn btn-secondary btn-sm" style="width: 100%; background: transparent;">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Resources</h1>
      <p class="page-subtitle">Workbooks, guides, and tools from Edmund's coaching sessions</p>
    </div>

    <div class="resources-grid" id="resources-grid">
      <div class="empty-state">Loading resources...</div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (!token) { window.location.href = '/client-portal'; return; }
      loadResources();
    });

    async function loadResources() {
      const token = localStorage.getItem('client_token');
      try {
        const data = await window.bogenAI.apiRequest('/client-portal/resources', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        renderResources(data.resources);
      } catch (error) {
        console.error('Load error:', error);
        if (error.message.includes('401')) logout();
      }
    }

    function getFileType(resource) {
      if (resource.file_url && resource.file_url.endsWith('.pdf')) return 'pdf';
      if (resource.category === 'video') return 'video';
      if (resource.category === 'template') return 'template';
      if (resource.external_link) return 'guide';
      return 'default';
    }

    function getIcon(type) {
      switch(type) {
        case 'pdf':
          return `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
        case 'video':
          return `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
        case 'template':
          return `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>`;
        default:
          return `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`;
      }
    }

    function getIconLabel(type) {
      switch(type) {
        case 'pdf': return 'PDF';
        case 'video': return 'Video';
        case 'template': return 'Workbook';
        default: return 'Resource';
      }
    }

    function renderResources(resources) {
      const container = document.getElementById('resources-grid');
      if (!resources || resources.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
            <p>No resources available yet.</p>
          </div>`;
        return;
      }

      container.innerHTML = resources.map(r => {
        const type = getFileType(r);
        const bannerClass = type === 'pdf' ? 'pdf' : (type === 'video' ? 'video' : (type === 'template' ? 'template' : 'default'));
        const link = r.file_url || r.external_link || '#';
        const btnLabel = r.file_url ? 'Download PDF' : 'View Resource';

        // Use thumbnail image if available, otherwise fall back to icon banner
        const bannerHtml = r.thumbnail_url
          ? `<div class="resource-thumbnail" style="background-image: url('${escapeHtml(r.thumbnail_url)}')"></div>`
          : `<div class="resource-icon-banner ${bannerClass}">
              ${getIcon(type)}
              <span class="resource-icon-label">${getIconLabel(type)}</span>
            </div>`;

        return `
          <div class="resource-card">
            ${bannerHtml}
            <div class="resource-body">
              <div class="resource-category">${formatCategory(r.category)}</div>
              <h3 class="resource-title">${escapeHtml(r.title)}</h3>
              <p class="resource-desc">${escapeHtml(r.description || '')}</p>
              <div class="resource-actions">
                <a href="${escapeHtml(link)}" target="_blank" class="btn btn-primary btn-sm">${btnLabel}</a>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function formatCategory(cat) {
      return cat.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function logout() { localStorage.removeItem('client_token'); window.location.href = '/client-portal'; }
  </script>
</body>
</html>
