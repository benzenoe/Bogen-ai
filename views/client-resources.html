<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources - Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <style>
    :root { --sidebar-width: 260px; }
    body { display: flex; min-height: 100vh; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width); background: rgba(15, 42, 63, 0.95); border-right: 1px solid rgba(100, 181, 246, 0.2); display: flex; flex-direction: column; z-index: 100; }
    .sidebar-header { padding: var(--spacing-lg); border-bottom: 1px solid rgba(100, 181, 246, 0.2); }
    .sidebar-nav { flex: 1; padding: var(--spacing-md) 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md) var(--spacing-lg); color: rgba(255, 255, 255, 0.7); transition: all var(--transition-fast); }
    .sidebar-nav a:hover { background: rgba(100, 181, 246, 0.1); color: var(--white); }
    .sidebar-nav a.active { background: rgba(100, 181, 246, 0.15); color: var(--cyan); border-left: 3px solid var(--cyan); }
    .sidebar-nav svg { width: 20px; height: 20px; }
    .sidebar-footer { padding: var(--spacing-lg); border-top: 1px solid rgba(100, 181, 246, 0.2); }
    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: var(--spacing-xl); background: var(--dark-gradient); }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; } }

    .page-header { margin-bottom: var(--spacing-xl); }
    .page-title { font-size: 1.75rem; margin-bottom: var(--spacing-xs); }

    .filter-tabs { display: flex; flex-wrap: wrap; gap: var(--spacing-sm); margin-bottom: var(--spacing-xl); }
    .filter-tab { padding: var(--spacing-sm) var(--spacing-md); background: rgba(26, 58, 82, 0.6); border: 1px solid rgba(100, 181, 246, 0.2); border-radius: 20px; cursor: pointer; font-size: 0.875rem; transition: all var(--transition-fast); }
    .filter-tab:hover { border-color: var(--cyan); }
    .filter-tab.active { background: var(--cyan); color: var(--navy); border-color: var(--cyan); }

    .resources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--spacing-lg); }

    .resource-card { background: rgba(26, 58, 82, 0.6); border: 1px solid rgba(100, 181, 246, 0.2); border-radius: var(--border-radius); overflow: hidden; transition: all var(--transition-fast); }
    .resource-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
    .resource-thumb { height: 160px; background: rgba(15, 42, 63, 0.8); display: flex; align-items: center; justify-content: center; }
    .resource-thumb svg { width: 48px; height: 48px; color: var(--cyan); opacity: 0.5; }
    .resource-body { padding: var(--spacing-lg); }
    .resource-category { font-size: 0.75rem; color: var(--cyan); text-transform: uppercase; margin-bottom: var(--spacing-xs); }
    .resource-title { font-size: 1.125rem; font-weight: 600; margin-bottom: var(--spacing-sm); }
    .resource-desc { font-size: 0.875rem; color: rgba(255, 255, 255, 0.6); margin-bottom: var(--spacing-md); }
    .resource-actions { display: flex; gap: var(--spacing-sm); }

    .empty-state { text-align: center; padding: var(--spacing-xxl); color: rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header"><a href="/" class="logo">bogen<span>.ai</span></a></div>
    <nav class="sidebar-nav">
      <a href="/client-dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="/client-transactions"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Transactions</a>
      <a href="/client-resources" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Resources</a>
      <a href="/client-messages"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Messages</a>
      <a href="/client-profile"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="btn btn-secondary btn-sm" style="width: 100%;">Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Resources</h1>
      <p style="color: rgba(255,255,255,0.6);">Guides, market reports, and helpful information</p>
    </div>

    <div class="filter-tabs">
      <span class="filter-tab active" data-category="">All</span>
      <span class="filter-tab" data-category="market_report">Market Reports</span>
      <span class="filter-tab" data-category="buying_guide">Buying Guides</span>
      <span class="filter-tab" data-category="selling_guide">Selling Guides</span>
      <span class="filter-tab" data-category="neighborhood_info">Neighborhoods</span>
    </div>

    <div class="resources-grid" id="resources-grid">
      <div class="empty-state">Loading resources...</div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    let currentCategory = '';

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (!token) { window.location.href = '/client-portal'; return; }

      // Check for category in URL
      const params = new URLSearchParams(window.location.search);
      if (params.get('category')) {
        currentCategory = params.get('category');
        document.querySelectorAll('.filter-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.category === currentCategory);
        });
      }

      loadResources();

      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentCategory = tab.dataset.category;
          loadResources();
        });
      });
    });

    async function loadResources() {
      const token = localStorage.getItem('client_token');
      const url = currentCategory ? `/client-portal/resources?category=${currentCategory}` : '/client-portal/resources';

      try {
        const data = await window.bogenAI.apiRequest(url, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        renderResources(data.resources);
      } catch (error) {
        console.error('Load error:', error);
        if (error.message.includes('401')) logout();
      }
    }

    function renderResources(resources) {
      const container = document.getElementById('resources-grid');
      if (!resources || resources.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No resources available in this category.</p></div>';
        return;
      }

      container.innerHTML = resources.map(r => `
        <div class="resource-card">
          <div class="resource-thumb">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <div class="resource-body">
            <div class="resource-category">${formatCategory(r.category)}</div>
            <h3 class="resource-title">${escapeHtml(r.title)}</h3>
            <p class="resource-desc">${escapeHtml(r.description || '')}</p>
            <div class="resource-actions">
              ${r.file_url ? `<a href="${escapeHtml(r.file_url)}" target="_blank" class="btn btn-primary btn-sm">Download</a>` : ''}
              ${r.external_link ? `<a href="${escapeHtml(r.external_link)}" target="_blank" class="btn btn-secondary btn-sm">View</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function formatCategory(cat) {
      return cat.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function logout() { localStorage.removeItem('client_token'); window.location.href = '/client-portal'; }
  </script>
</body>
</html>
