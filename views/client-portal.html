<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/client-theme.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
    }

    .login-box {
      max-width: 500px;
      width: 100%;
    }

    .login-box .card {
      background: #ffffff;
      border: 1px solid rgba(26, 62, 92, 0.12);
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(26, 62, 92, 0.10);
    }

    .login-box .text-center .logo {
      color: #1a3e5c;
    }

    .login-box .text-center .logo span {
      color: #00a8e1;
    }

    .login-box h2 {
      color: #1a3e5c;
      font-size: 1.75rem;
      font-weight: 600;
    }

    .login-box .text-gray {
      color: #3d5264;
      font-size: 1rem;
    }

    .tabs {
      display: flex;
      margin-bottom: var(--spacing-lg);
      border-bottom: 2px solid rgba(26, 62, 92, 0.1);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 14px var(--spacing-md);
      cursor: pointer;
      color: #3d5264;
      font-size: 1.05rem;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition-fast);
    }

    .tab:hover {
      color: #1a3e5c;
    }

    .tab.active {
      color: #00a8e1;
      border-bottom-color: #00a8e1;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .login-box .form-label {
      color: #1a3e5c;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .login-box .form-input {
      background: #f7f9fb;
      color: #0f1d2a;
      border: 1px solid rgba(26, 62, 92, 0.18);
      font-size: 1rem;
      padding: 14px 16px;
    }

    .login-box .form-input:focus {
      border-color: #00a8e1;
      box-shadow: 0 0 0 3px rgba(0, 168, 225, 0.12);
      background: #fff;
    }

    .login-box .form-input::placeholder {
      color: #8899a8;
    }

    .login-box .btn-primary {
      background: #00a8e1;
      color: #fff;
      font-size: 1.05rem;
      padding: 16px;
      margin-top: 8px;
    }

    .login-box .btn-primary:hover {
      background: #0090c4;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.9rem;
      color: #00a8e1;
      margin-top: var(--spacing-sm);
    }

    .forgot-link:hover {
      text-decoration: underline;
      color: #0090c4;
    }

    .forgot-inline {
      text-align: center;
      margin-top: var(--spacing-md);
    }

    .forgot-inline a {
      color: #00a8e1;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .forgot-inline a:hover {
      text-decoration: underline;
      color: #0090c4;
    }

    /* Forgot password inline form (hidden by default) */
    .forgot-section {
      display: none;
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid rgba(26, 62, 92, 0.1);
    }

    .forgot-section.active {
      display: block;
    }

    .forgot-section h4 {
      color: #1a3e5c;
      font-size: 1rem;
      margin-bottom: var(--spacing-sm);
    }

    .success-message {
      background: rgba(76, 175, 80, 0.08);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: var(--border-radius);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      color: #2e7d32;
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-box">
      <div class="text-center mb-lg">
        <a href="/" class="logo" style="font-size: 2.25rem;">bogen<span>.ai</span></a>
        <h2 class="mt-lg">Client Portal</h2>
      </div>

      <div class="card">
        <!-- Tabs -->
        <div class="tabs">
          <div class="tab active" onclick="switchTab('login')">Login</div>
          <div class="tab" onclick="switchTab('register')">Create Account</div>
        </div>

        <!-- Login Form -->
        <div id="login-tab" class="tab-content active">
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-input" required placeholder="your@email.com">
            </div>

            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-input" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
          </form>

          <div class="forgot-inline">
            <a href="#" onclick="toggleForgot(event)">Forgot password?</a>
          </div>

          <!-- Inline forgot password -->
          <div id="forgot-section" class="forgot-section">
            <h4>Reset your password</h4>
            <div id="forgot-success" class="success-message hidden">
              Check your email for a reset link.
            </div>
            <form id="forgotForm" onsubmit="handleForgotPassword(event)">
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" required placeholder="your@email.com">
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
          </div>
        </div>

        <!-- Register Form -->
        <div id="register-tab" class="tab-content">
          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" name="firstName" class="form-input" required placeholder="First name">
              </div>
              <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" name="lastName" class="form-input" required placeholder="Last name">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-input" required placeholder="your@email.com">
            </div>

            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" name="phone" class="form-input" placeholder="(555) 123-4567">
            </div>

            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-input" required minlength="8" placeholder="Minimum 8 characters">
            </div>

            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirmPassword" class="form-input" required minlength="8" placeholder="Confirm your password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (token) {
        window.location.href = '/client-dashboard';
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
      document.getElementById('login-tab').classList.toggle('active', tab === 'login');
      document.getElementById('register-tab').classList.toggle('active', tab === 'register');
    }

    function toggleForgot(event) {
      event.preventDefault();
      const section = document.getElementById('forgot-section');
      section.classList.toggle('active');
      document.getElementById('forgot-success').classList.add('hidden');
    }

    async function handleLogin(event) {
      event.preventDefault();
      const formData = new FormData(event.target);

      try {
        const response = await window.bogenAI.apiRequest('/auth/client/login', {
          method: 'POST',
          body: JSON.stringify({
            email: formData.get('email'),
            password: formData.get('password')
          })
        });

        localStorage.setItem('client_token', response.token);
        window.bogenAI.showNotification('Welcome back!', 'success');
        setTimeout(() => { window.location.href = '/client-dashboard'; }, 500);
      } catch (error) {
        window.bogenAI.showNotification(error.message || 'Login failed', 'error');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      const formData = new FormData(event.target);

      if (formData.get('password') !== formData.get('confirmPassword')) {
        window.bogenAI.showNotification('Passwords do not match', 'error');
        return;
      }

      try {
        const response = await window.bogenAI.apiRequest('/auth/client/register', {
          method: 'POST',
          body: JSON.stringify({
            firstName: formData.get('firstName'),
            lastName: formData.get('lastName'),
            email: formData.get('email'),
            phone: formData.get('phone'),
            password: formData.get('password')
          })
        });

        localStorage.setItem('client_token', response.token);
        window.bogenAI.showNotification('Account created!', 'success');
        setTimeout(() => { window.location.href = '/client-dashboard'; }, 500);
      } catch (error) {
        window.bogenAI.showNotification(error.message || 'Registration failed', 'error');
      }
    }

    async function handleForgotPassword(event) {
      event.preventDefault();
      const formData = new FormData(event.target);

      try {
        await window.bogenAI.apiRequest('/auth/client/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email: formData.get('email') })
        });
      } catch (e) { /* show success either way */ }

      document.getElementById('forgot-success').classList.remove('hidden');
      event.target.classList.add('hidden');
    }
  </script>

</body>
</html>
