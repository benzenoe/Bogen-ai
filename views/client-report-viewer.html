<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report - Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <style>
    :root {
      --sidebar-width: 260px;
    }

    body {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: rgba(15, 42, 63, 0.95);
      border-right: 1px solid rgba(100, 181, 246, 0.2);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: var(--spacing-lg);
      border-bottom: 1px solid rgba(100, 181, 246, 0.2);
    }

    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-md) 0;
      overflow-y: auto;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-lg);
      color: rgba(255, 255, 255, 0.7);
      transition: all var(--transition-fast);
    }

    .sidebar-nav a:hover {
      background: rgba(100, 181, 246, 0.1);
      color: var(--white);
    }

    .sidebar-nav a.active {
      background: rgba(100, 181, 246, 0.15);
      color: var(--cyan);
      border-left: 3px solid var(--cyan);
    }

    .sidebar-nav svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: var(--spacing-lg);
      border-top: 1px solid rgba(100, 181, 246, 0.2);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(100, 181, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-weight: 600;
    }

    .user-name {
      font-weight: 500;
    }

    .user-email {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Main content */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: var(--spacing-lg);
      background: var(--dark-gradient);
      display: flex;
      flex-direction: column;
    }

    /* Report header */
    .report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }

    .report-header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cyan);
      font-size: 0.875rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .report-info h1 {
      font-size: 1.25rem;
      margin-bottom: 2px;
    }

    .report-meta {
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .report-type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(100, 181, 246, 0.2);
      color: var(--cyan);
    }

    /* Report iframe container */
    .report-frame-container {
      flex: 1;
      background: white;
      border-radius: var(--border-radius);
      overflow: hidden;
      border: 1px solid rgba(100, 181, 246, 0.2);
      min-height: 500px;
    }

    .report-frame-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      min-height: 500px;
    }

    /* Loading state */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 500px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Error state */
    .error-state {
      text-align: center;
      padding: var(--spacing-xxl);
      color: rgba(255, 255, 255, 0.5);
    }

    /* Mobile */
    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: var(--spacing-md);
      left: var(--spacing-md);
      z-index: 150;
      background: rgba(15, 42, 63, 0.95);
      border: 1px solid rgba(100, 181, 246, 0.3);
      border-radius: 8px;
      padding: var(--spacing-sm);
      cursor: pointer;
    }

    .mobile-menu-btn svg {
      width: 24px;
      height: 24px;
      color: var(--cyan);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform var(--transition-normal);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
      .mobile-menu-btn {
        display: flex !important;
      }
    }
  </style>
</head>
<body>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" onclick="toggleSidebar()">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="logo">bogen<span>.ai</span></a>
    </div>

    <nav class="sidebar-nav">
      <a href="/client-dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="/client-transactions">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        Transactions
      </a>
      <a href="/client-resources">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        Resources
      </a>
      <a href="/client-messages">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        Messages
      </a>
      <a href="/client-reports" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Reports
      </a>
      <a href="/client-documents">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        Documents
      </a>
      <a href="/client-appointments">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Appointments
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-initials">--</div>
        <div>
          <div class="user-name" id="user-name">Loading...</div>
          <div class="user-email" id="user-email">Loading...</div>
        </div>
      </div>
      <a href="/client-profile" class="btn btn-secondary btn-sm" style="width: 100%; margin-bottom: var(--spacing-xs);">Profile</a>
      <button onclick="logout()" class="btn btn-secondary btn-sm" style="width: 100%; background: transparent;">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="report-header" id="report-header" style="display: none;">
      <div class="report-header-left">
        <button class="back-btn" onclick="window.location.href='/client-reports'">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          Back to Reports
        </button>
        <div class="report-info">
          <h1 id="report-title">Loading...</h1>
          <div class="report-meta">
            <span class="report-type-badge" id="report-type"></span>
            <span id="report-date"></span>
            <span id="report-author"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="report-frame-container" id="report-container">
      <div class="loading-state" id="loading-state">
        <p>Loading report...</p>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (!token) {
        window.location.href = '/client-portal';
        return;
      }
      loadUserInfo();
      loadReport();
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    async function loadUserInfo() {
      const token = localStorage.getItem('client_token');
      try {
        const response = await window.bogenAI.apiRequest('/auth/client/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const client = response.client;
        document.getElementById('user-name').textContent = `${client.firstName} ${client.lastName}`;
        document.getElementById('user-email').textContent = client.email;
        document.getElementById('user-initials').textContent = `${client.firstName[0]}${client.lastName[0]}`;
      } catch (error) {
        console.error('Failed to load user info:', error);
        if (error.message.includes('Authentication') || error.message.includes('401')) {
          logout();
        }
      }
    }

    async function loadReport() {
      const token = localStorage.getItem('client_token');
      const reportId = window.location.pathname.split('/').pop();

      try {
        const data = await window.bogenAI.apiRequest(`/client-portal/reports/${reportId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const report = data.report;

        // Update header
        document.getElementById('report-title').textContent = report.title;
        document.getElementById('report-type').textContent = formatReportType(report.report_type);
        document.getElementById('report-date').textContent = ' \u2022 ' + formatDate(report.created_at);
        document.getElementById('report-author').textContent = ' \u2022 ' + report.created_by;
        document.getElementById('report-header').style.display = 'flex';
        document.title = `${report.title} - Client Portal - Bogen.ai`;

        // Render report in sandboxed iframe
        const container = document.getElementById('report-container');
        const iframe = document.createElement('iframe');
        iframe.sandbox = 'allow-same-origin';
        iframe.style.width = '100%';
        iframe.style.border = 'none';
        iframe.style.minHeight = '500px';

        container.innerHTML = '';
        container.appendChild(iframe);

        // Write HTML content to iframe
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(report.report_html);
        doc.close();

        // Auto-resize iframe to content height
        function resizeIframe() {
          try {
            const height = doc.documentElement.scrollHeight || doc.body.scrollHeight;
            iframe.style.height = Math.max(height, 500) + 'px';
          } catch (e) {
            iframe.style.height = '800px';
          }
        }

        // Resize after content loads
        iframe.addEventListener('load', resizeIframe);
        setTimeout(resizeIframe, 500);
        setTimeout(resizeIframe, 1500);

      } catch (error) {
        console.error('Failed to load report:', error);
        const container = document.getElementById('report-container');

        if (error.message.includes('Authentication') || error.message.includes('401')) {
          logout();
          return;
        }

        container.innerHTML = `
          <div class="error-state">
            <p>Unable to load this report.</p>
            <p style="font-size: 0.875rem; margin-top: 8px;">
              <a href="/client-reports" style="color: var(--cyan);">Return to reports list</a>
            </p>
          </div>
        `;
      }
    }

    function formatReportType(type) {
      const types = {
        'market_analysis': 'Market Analysis',
        'property_report': 'Property Report',
        'investment_summary': 'Investment Summary',
        'neighborhood_report': 'Neighborhood Report',
        'comparative_market_analysis': 'CMA',
        'annual_review': 'Annual Review',
        'general': 'General'
      };
      return types[type] || type;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric'
      });
    }

    function logout() {
      localStorage.removeItem('client_token');
      window.location.href = '/client-portal';
    }
  </script>

</body>
</html>
