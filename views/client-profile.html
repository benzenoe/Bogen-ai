<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/client-theme.css">
  <style>
    :root { --sidebar-width: 260px; }
    body { display: flex; min-height: 100vh; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width); background: rgba(15, 42, 63, 0.95); border-right: 1px solid rgba(100, 181, 246, 0.2); display: flex; flex-direction: column; z-index: 100; }
    .sidebar-header { padding: var(--spacing-lg); border-bottom: 1px solid rgba(100, 181, 246, 0.2); }
    .sidebar-nav { flex: 1; padding: var(--spacing-md) 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: var(--spacing-sm); padding: var(--spacing-md) var(--spacing-lg); color: rgba(255, 255, 255, 0.7); transition: all var(--transition-fast); }
    .sidebar-nav a:hover { background: rgba(100, 181, 246, 0.1); color: var(--white); }
    .sidebar-nav a.active { background: rgba(100, 181, 246, 0.15); color: var(--cyan); border-left: 3px solid var(--cyan); }
    .sidebar-nav svg { width: 20px; height: 20px; }
    .sidebar-footer { padding: var(--spacing-lg); border-top: 1px solid rgba(100, 181, 246, 0.2); }
    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: var(--spacing-xl); background: var(--dark-gradient); max-width: 800px; }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; } }

    .page-title { font-size: 1.75rem; margin-bottom: var(--spacing-xl); }

    .profile-section { background: rgba(26, 58, 82, 0.6); border: 1px solid rgba(100, 181, 246, 0.2); border-radius: var(--border-radius); padding: var(--spacing-xl); margin-bottom: var(--spacing-xl); }
    .section-title { font-size: 1.125rem; margin-bottom: var(--spacing-lg); }

    .profile-header { display: flex; align-items: center; gap: var(--spacing-lg); margin-bottom: var(--spacing-xl); }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(100, 181, 246, 0.2); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--cyan); font-weight: 600; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md); }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

    .success-msg { background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.3); border-radius: var(--border-radius); padding: var(--spacing-md); margin-bottom: var(--spacing-md); color: #4CAF50; }
    .success-msg.hidden { display: none; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header"><a href="/" class="logo">bogen<span>.ai</span></a></div>
    <nav class="sidebar-nav">
      <a href="/client-dashboard"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
      <a href="/client-transactions"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Transactions</a>
      <a href="/client-resources"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Resources</a>
      <a href="/client-messages"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>Messages</a>
      <a href="/client-reports"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Reports</a>
      <a href="/client-documents"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>Documents</a>
      <a href="/client-appointments"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>Appointments</a>
      <a href="/client-profile" class="active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" class="btn btn-secondary btn-sm" style="width: 100%;">Logout</button></div>
  </aside>

  <main class="main-content">
    <h1 class="page-title">Profile Settings</h1>

    <!-- Profile Info -->
    <div class="profile-section">
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar">--</div>
        <div>
          <h2 id="profile-name">Loading...</h2>
          <p style="color: rgba(255,255,255,0.6);" id="profile-email">Loading...</p>
        </div>
      </div>

      <div id="profile-success" class="success-msg hidden">Profile updated successfully!</div>

      <form id="profileForm" onsubmit="updateProfile(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" name="firstName" id="firstName" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" name="lastName" id="lastName" class="form-input" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" name="phone" id="phone" class="form-input" placeholder="(555) 123-4567">
        </div>
        <div class="form-group">
          <label class="form-label">Company</label>
          <input type="text" name="company" id="company" class="form-input" placeholder="Your company">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>

    <!-- Change Password -->
    <div class="profile-section">
      <h3 class="section-title">Change Password</h3>
      <div id="password-success" class="success-msg hidden">Password changed successfully!</div>
      <form id="passwordForm" onsubmit="changePassword(event)">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="currentPassword" class="form-input" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" name="newPassword" class="form-input" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirmPassword" class="form-input" required minlength="8">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
      </form>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (!token) { window.location.href = '/client-portal'; return; }
      loadProfile();
    });

    async function loadProfile() {
      const token = localStorage.getItem('client_token');
      try {
        const data = await window.bogenAI.apiRequest('/auth/client/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const c = data.client;
        document.getElementById('profile-avatar').textContent = `${c.firstName[0]}${c.lastName[0]}`;
        document.getElementById('profile-name').textContent = `${c.firstName} ${c.lastName}`;
        document.getElementById('profile-email').textContent = c.email;
        document.getElementById('firstName').value = c.firstName;
        document.getElementById('lastName').value = c.lastName;
        document.getElementById('phone').value = c.phone || '';
        document.getElementById('company').value = c.company || '';
      } catch (error) {
        if (error.message.includes('401')) logout();
      }
    }

    async function updateProfile(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      const token = localStorage.getItem('client_token');

      try {
        await window.bogenAI.apiRequest('/client-portal/profile', {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            firstName: formData.get('firstName'),
            lastName: formData.get('lastName'),
            phone: formData.get('phone'),
            company: formData.get('company')
          })
        });
        document.getElementById('profile-success').classList.remove('hidden');
        loadProfile();
        setTimeout(() => document.getElementById('profile-success').classList.add('hidden'), 3000);
      } catch (error) {
        window.bogenAI.showNotification(error.message || 'Update failed', 'error');
      }
    }

    async function changePassword(event) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);

      if (formData.get('newPassword') !== formData.get('confirmPassword')) {
        window.bogenAI.showNotification('Passwords do not match', 'error');
        return;
      }

      const token = localStorage.getItem('client_token');
      try {
        await window.bogenAI.apiRequest('/auth/client/change-password', {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            currentPassword: formData.get('currentPassword'),
            newPassword: formData.get('newPassword')
          })
        });
        document.getElementById('password-success').classList.remove('hidden');
        form.reset();
        setTimeout(() => document.getElementById('password-success').classList.add('hidden'), 3000);
      } catch (error) {
        window.bogenAI.showNotification(error.message || 'Password change failed', 'error');
      }
    }

    function logout() { localStorage.removeItem('client_token'); window.location.href = '/client-portal'; }
  </script>
</body>
</html>
