<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <style>
    :root {
      --sidebar-width: 260px;
    }

    body {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: rgba(15, 42, 63, 0.95);
      border-right: 1px solid rgba(100, 181, 246, 0.2);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: var(--spacing-lg);
      border-bottom: 1px solid rgba(100, 181, 246, 0.2);
    }

    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-md) 0;
      overflow-y: auto;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-lg);
      color: rgba(255, 255, 255, 0.7);
      transition: all var(--transition-fast);
    }

    .sidebar-nav a:hover {
      background: rgba(100, 181, 246, 0.1);
      color: var(--white);
    }

    .sidebar-nav a.active {
      background: rgba(100, 181, 246, 0.15);
      color: var(--cyan);
      border-left: 3px solid var(--cyan);
    }

    .sidebar-nav svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--cyan);
      color: var(--navy);
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: var(--spacing-lg);
      border-top: 1px solid rgba(100, 181, 246, 0.2);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(100, 181, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-weight: 600;
    }

    .user-name {
      font-weight: 500;
    }

    .user-email {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Main content */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: var(--spacing-xl);
      background: var(--dark-gradient);
    }

    .page-header {
      margin-bottom: var(--spacing-xl);
    }

    .page-title {
      font-size: 1.75rem;
      margin-bottom: var(--spacing-xs);
    }

    .page-subtitle {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Report cards */
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--spacing-lg);
    }

    .report-card {
      background: rgba(26, 58, 82, 0.6);
      border: 1px solid rgba(100, 181, 246, 0.2);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .report-card:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    .report-type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(100, 181, 246, 0.2);
      color: var(--cyan);
      margin-bottom: var(--spacing-sm);
    }

    .report-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: var(--spacing-xs);
    }

    .report-description {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: var(--spacing-md);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .report-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .report-meta svg {
      width: 16px;
      height: 16px;
      margin-right: 4px;
      vertical-align: -3px;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(100, 181, 246, 0.3);
      color: rgba(255, 255, 255, 0.7);
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all var(--transition-fast);
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: rgba(100, 181, 246, 0.2);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .empty-state {
      text-align: center;
      padding: var(--spacing-xxl);
      color: rgba(255, 255, 255, 0.5);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: var(--spacing-md);
      opacity: 0.5;
    }

    /* Mobile */
    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: var(--spacing-md);
      left: var(--spacing-md);
      z-index: 150;
      background: rgba(15, 42, 63, 0.95);
      border: 1px solid rgba(100, 181, 246, 0.3);
      border-radius: 8px;
      padding: var(--spacing-sm);
      cursor: pointer;
    }

    .mobile-menu-btn svg {
      width: 24px;
      height: 24px;
      color: var(--cyan);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform var(--transition-normal);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
      }
      .mobile-menu-btn {
        display: flex !important;
      }
      .reports-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" onclick="toggleSidebar()">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="logo">bogen<span>.ai</span></a>
    </div>

    <nav class="sidebar-nav">
      <a href="/client-dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="/client-transactions">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        Transactions
      </a>
      <a href="/client-resources">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        Resources
      </a>
      <a href="/client-messages">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        Messages
      </a>
      <a href="/client-reports" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Reports
      </a>
      <a href="/client-documents">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        Documents
      </a>
      <a href="/client-appointments">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Appointments
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-initials">--</div>
        <div>
          <div class="user-name" id="user-name">Loading...</div>
          <div class="user-email" id="user-email">Loading...</div>
        </div>
      </div>
      <a href="/client-profile" class="btn btn-secondary btn-sm" style="width: 100%; margin-bottom: var(--spacing-xs);">Profile</a>
      <button onclick="logout()" class="btn btn-secondary btn-sm" style="width: 100%; background: transparent;">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Your Reports</h1>
      <p class="page-subtitle">Personalized reports prepared by The Edmund Bogen Team</p>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-type="">All Reports</button>
      <button class="filter-btn" data-type="market_analysis">Market Analysis</button>
      <button class="filter-btn" data-type="property_report">Property Report</button>
      <button class="filter-btn" data-type="investment_summary">Investment Summary</button>
      <button class="filter-btn" data-type="comparative_market_analysis">CMA</button>
      <button class="filter-btn" data-type="neighborhood_report">Neighborhood</button>
    </div>

    <!-- Reports Grid -->
    <div class="reports-grid" id="reports-grid">
      <div class="empty-state">
        <p>Loading reports...</p>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    let allReports = [];
    let activeFilter = '';

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (!token) {
        window.location.href = '/client-portal';
        return;
      }
      loadUserInfo();
      loadReports();
      setupFilters();
    });

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    async function loadUserInfo() {
      const token = localStorage.getItem('client_token');
      try {
        const response = await window.bogenAI.apiRequest('/auth/client/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const client = response.client;
        document.getElementById('user-name').textContent = `${client.firstName} ${client.lastName}`;
        document.getElementById('user-email').textContent = client.email;
        document.getElementById('user-initials').textContent = `${client.firstName[0]}${client.lastName[0]}`;
      } catch (error) {
        console.error('Failed to load user info:', error);
        if (error.message.includes('Authentication') || error.message.includes('401')) {
          logout();
        }
      }
    }

    async function loadReports() {
      const token = localStorage.getItem('client_token');

      try {
        const data = await window.bogenAI.apiRequest('/client-portal/reports', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        allReports = data.reports;
        renderReports(allReports);
      } catch (error) {
        console.error('Failed to load reports:', error);
        if (error.message.includes('Authentication') || error.message.includes('401')) {
          logout();
        }
      }
    }

    function renderReports(reports) {
      const container = document.getElementById('reports-grid');

      if (!reports || reports.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p>${activeFilter ? 'No reports of this type' : 'No reports available yet'}</p>
            <p style="font-size: 0.875rem; margin-top: 8px;">Your personalized reports will appear here once prepared.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = reports.map(r => `
        <div class="report-card" onclick="window.location.href='/client-report/${r.report_id}'">
          <span class="report-type-badge">${formatReportType(r.report_type)}</span>
          <h3 class="report-title">${escapeHtml(r.title)}</h3>
          ${r.description ? `<p class="report-description">${escapeHtml(r.description)}</p>` : ''}
          <div class="report-meta">
            <span>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              ${escapeHtml(r.created_by)}
            </span>
            <span>
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              ${formatDate(r.created_at)}
            </span>
          </div>
        </div>
      `).join('');
    }

    function setupFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.type;

          if (activeFilter) {
            renderReports(allReports.filter(r => r.report_type === activeFilter));
          } else {
            renderReports(allReports);
          }
        });
      });
    }

    function formatReportType(type) {
      const types = {
        'market_analysis': 'Market Analysis',
        'property_report': 'Property Report',
        'investment_summary': 'Investment Summary',
        'neighborhood_report': 'Neighborhood Report',
        'comparative_market_analysis': 'CMA',
        'annual_review': 'Annual Review',
        'general': 'General'
      };
      return types[type] || type;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function logout() {
      localStorage.removeItem('client_token');
      window.location.href = '/client-portal';
    }
  </script>

</body>
</html>
