<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaction Details - Client Portal - Bogen.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">
  <style>
    :root {
      --sidebar-width: 260px;
    }

    body {
      display: flex;
      min-height: 100vh;
    }

    /* Import sidebar styles from dashboard */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: rgba(15, 42, 63, 0.95);
      border-right: 1px solid rgba(100, 181, 246, 0.2);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header {
      padding: var(--spacing-lg);
      border-bottom: 1px solid rgba(100, 181, 246, 0.2);
    }

    .sidebar-nav {
      flex: 1;
      padding: var(--spacing-md) 0;
      overflow-y: auto;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-lg);
      color: rgba(255, 255, 255, 0.7);
      transition: all var(--transition-fast);
    }

    .sidebar-nav a:hover {
      background: rgba(100, 181, 246, 0.1);
      color: var(--white);
    }

    .sidebar-nav a.active {
      background: rgba(100, 181, 246, 0.15);
      color: var(--cyan);
      border-left: 3px solid var(--cyan);
    }

    .sidebar-nav svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: var(--spacing-lg);
      border-top: 1px solid rgba(100, 181, 246, 0.2);
    }

    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: var(--spacing-xl);
      background: var(--dark-gradient);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .main-content {
        margin-left: 0;
      }
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: var(--spacing-md);
      font-size: 0.875rem;
    }

    .back-link:hover {
      color: var(--cyan);
    }

    /* Transaction header */
    .transaction-header {
      background: rgba(26, 58, 82, 0.6);
      border: 1px solid rgba(100, 181, 246, 0.2);
      border-radius: var(--border-radius);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-xl);
    }

    .transaction-title {
      font-size: 1.5rem;
      margin-bottom: var(--spacing-sm);
    }

    .transaction-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-lg);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.875rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    .status-initiated { background: rgba(158, 158, 158, 0.2); color: #9E9E9E; }
    .status-in_progress { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
    .status-under_review { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
    .status-pending_closing { background: rgba(156, 39, 176, 0.2); color: #CE93D8; }
    .status-completed { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }

    /* Two column layout */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: var(--spacing-xl);
    }

    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Timeline section */
    .timeline-section {
      background: rgba(26, 58, 82, 0.6);
      border: 1px solid rgba(100, 181, 246, 0.2);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
    }

    .section-title {
      font-size: 1.125rem;
      margin-bottom: var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: var(--spacing-xl);
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(100, 181, 246, 0.2);
    }

    .timeline-item {
      position: relative;
      padding-bottom: var(--spacing-lg);
    }

    .timeline-item:last-child {
      padding-bottom: 0;
    }

    .timeline-marker {
      position: absolute;
      left: -27px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(26, 58, 82, 1);
      border: 2px solid rgba(100, 181, 246, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timeline-marker.completed {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .timeline-marker.in_progress {
      background: rgba(26, 58, 82, 1);
      border-color: var(--cyan);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(100, 181, 246, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(100, 181, 246, 0); }
    }

    .timeline-marker svg {
      width: 12px;
      height: 12px;
      color: var(--white);
    }

    .timeline-content {
      background: rgba(15, 42, 63, 0.5);
      border-radius: var(--border-radius);
      padding: var(--spacing-md);
    }

    .timeline-content.current {
      border-left: 3px solid var(--cyan);
    }

    .timeline-step-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .timeline-step-desc {
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: var(--spacing-xs);
    }

    .timeline-step-date {
      font-size: 0.75rem;
      color: var(--cyan);
    }

    /* Sidebar cards */
    .sidebar-card {
      background: rgba(26, 58, 82, 0.6);
      border: 1px solid rgba(100, 181, 246, 0.2);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .sidebar-card-title {
      font-size: 1rem;
      margin-bottom: var(--spacing-md);
    }

    /* Documents list */
    .document-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm);
      background: rgba(15, 42, 63, 0.5);
      border-radius: var(--border-radius);
      margin-bottom: var(--spacing-xs);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .document-item:hover {
      background: rgba(15, 42, 63, 0.8);
    }

    .document-icon {
      color: var(--cyan);
    }

    .document-name {
      flex: 1;
      font-size: 0.875rem;
    }

    /* Contact card */
    .contact-info {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .contact-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(100, 181, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cyan);
      font-weight: 600;
    }

    .contact-name {
      font-weight: 500;
    }

    .contact-role {
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.6);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: var(--spacing-lg);
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="logo">bogen<span>.ai</span></a>
    </div>
    <nav class="sidebar-nav">
      <a href="/client-dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="/client-transactions" class="active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        Transactions
      </a>
      <a href="/client-resources">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        Resources
      </a>
      <a href="/client-messages">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        Messages
      </a>
      <a href="/client-documents">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        Documents
      </a>
      <a href="/client-appointments">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Appointments
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/client-profile" class="btn btn-secondary btn-sm" style="width: 100%; margin-bottom: var(--spacing-xs);">Profile</a>
      <button onclick="logout()" class="btn btn-secondary btn-sm" style="width: 100%; background: transparent;">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <a href="/client-transactions" class="back-link">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Transactions
    </a>

    <!-- Transaction Header -->
    <div class="transaction-header" id="transaction-header">
      <h1 class="transaction-title" id="tx-title">Loading...</h1>
      <div class="transaction-meta">
        <div class="meta-item">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          </svg>
          <span id="tx-address">-</span>
        </div>
        <div class="meta-item">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span id="tx-assigned">-</span>
        </div>
        <div class="meta-item">
          <span class="status-badge" id="tx-status">-</span>
        </div>
      </div>
    </div>

    <div class="content-grid">
      <!-- Timeline -->
      <div class="timeline-section">
        <h2 class="section-title">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
          Progress Timeline
        </h2>
        <div class="timeline" id="timeline">
          <div class="empty-state">Loading timeline...</div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar-cards">
        <!-- Your Contact -->
        <div class="sidebar-card">
          <h3 class="sidebar-card-title">Your Contact</h3>
          <div class="contact-info" id="contact-info">
            <div class="contact-avatar">EB</div>
            <div>
              <div class="contact-name">Edmund Bogen</div>
              <div class="contact-role">Your Agent</div>
            </div>
          </div>
          <a href="/client-messages" class="btn btn-primary btn-sm" style="width: 100%; margin-top: var(--spacing-md);">Send Message</a>
        </div>

        <!-- Documents -->
        <div class="sidebar-card">
          <h3 class="sidebar-card-title">Documents</h3>
          <div id="documents-list">
            <div class="empty-state">No documents yet</div>
          </div>
        </div>

        <!-- Transaction Details -->
        <div class="sidebar-card">
          <h3 class="sidebar-card-title">Details</h3>
          <div style="font-size: 0.875rem;">
            <p style="margin-bottom: var(--spacing-sm);"><strong>Started:</strong> <span id="tx-start">-</span></p>
            <p style="margin-bottom: var(--spacing-sm);"><strong>Est. Completion:</strong> <span id="tx-completion">-</span></p>
            <p id="tx-description" style="color: rgba(255,255,255,0.6);"></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    // Get transaction ID from URL
    const pathParts = window.location.pathname.split('/');
    const transactionId = pathParts[pathParts.length - 1];

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('client_token');
      if (!token) {
        window.location.href = '/client-portal';
        return;
      }
      loadTransactionData();
    });

    async function loadTransactionData() {
      const token = localStorage.getItem('client_token');

      try {
        const data = await window.bogenAI.apiRequest(`/client-portal/transactions/${transactionId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        renderTransaction(data.transaction);
        renderTimeline(data.timeline);
        renderDocuments(data.documents);

      } catch (error) {
        console.error('Load error:', error);
        if (error.message.includes('404')) {
          window.location.href = '/client-transactions';
        } else if (error.message.includes('401')) {
          logout();
        }
      }
    }

    function renderTransaction(tx) {
      document.getElementById('tx-title').textContent = tx.title;
      document.getElementById('tx-address').textContent = tx.property_address || tx.service_type || 'Transaction';
      document.getElementById('tx-assigned').textContent = tx.assigned_to || 'Edmund Bogen Team';

      const statusBadge = document.getElementById('tx-status');
      statusBadge.textContent = tx.status.replace(/_/g, ' ');
      statusBadge.className = `status-badge status-${tx.status}`;

      document.getElementById('tx-start').textContent = tx.start_date ? formatDate(tx.start_date) : 'Not started';
      document.getElementById('tx-completion').textContent = tx.estimated_completion ? formatDate(tx.estimated_completion) : 'TBD';
      document.getElementById('tx-description').textContent = tx.description || '';

      // Update contact if assigned
      if (tx.assigned_to) {
        const initials = tx.assigned_to.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('contact-info').innerHTML = `
          <div class="contact-avatar">${initials}</div>
          <div>
            <div class="contact-name">${escapeHtml(tx.assigned_to)}</div>
            <div class="contact-role">Your Agent</div>
          </div>
        `;
      }
    }

    function renderTimeline(timeline) {
      const container = document.getElementById('timeline');

      if (!timeline || timeline.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Timeline steps will appear here as your transaction progresses.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = timeline.map((step, index) => {
        const isCompleted = step.status === 'completed';
        const isInProgress = step.status === 'in_progress';
        const isCurrent = isInProgress || (index === timeline.findIndex(s => s.status !== 'completed'));

        return `
          <div class="timeline-item">
            <div class="timeline-marker ${step.status}">
              ${isCompleted ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
            </div>
            <div class="timeline-content ${isCurrent ? 'current' : ''}">
              <div class="timeline-step-name">${escapeHtml(step.step_name)}</div>
              ${step.step_description ? `<div class="timeline-step-desc">${escapeHtml(step.step_description)}</div>` : ''}
              ${step.completed_at ? `<div class="timeline-step-date">Completed ${formatDate(step.completed_at)}</div>` : ''}
              ${isInProgress ? `<div class="timeline-step-date">In Progress</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderDocuments(documents) {
      const container = document.getElementById('documents-list');

      if (!documents || documents.length === 0) {
        container.innerHTML = `<div class="empty-state">No documents yet</div>`;
        return;
      }

      container.innerHTML = documents.map(doc => `
        <a href="${escapeHtml(doc.file_url)}" target="_blank" class="document-item">
          <svg class="document-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
          <span class="document-name">${escapeHtml(doc.title)}</span>
        </a>
      `).join('');
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function logout() {
      localStorage.removeItem('client_token');
      window.location.href = '/client-portal';
    }
  </script>

</body>
</html>
